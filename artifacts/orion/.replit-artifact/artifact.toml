kind = "web"
previewPath = "/"
title = "ORION — Orbital Real-time Intelligence & Operations Network"
version = "1.0.0"
id = "artifacts/orion"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19329

[services.development]
run = "pnpm --filter @workspace/orion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orion", "run", "build" ]
serve = "static"
publicDir = "artifacts/orion/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19329"
BASE_PATH = "/"
